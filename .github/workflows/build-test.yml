name: build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with: 
        submodules: recursive
    - name: set up packages
      run: |
          sudo apt-get update
          sudo apt install ninja-build gcc libxxhash-dev
          sudo apt install build-essential git make pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev
          pipx install meson
    - name: build release
      run: |
        meson setup build
        meson compile -C build
    - name: upload build
      uses: actions/upload-artifact@v4
      with:
        name: sleepdart-linux
        path: sleepdart
    - name: run tests
      run: |
        echo "limit-fps=0" > ./config.ini
        SDL_VIDEODRIVER=dummy ; export SDL_VIDEODRIVER
        ./run_tests.sh

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: msys2/setup-msys2@v2
      with:
        release: false
        install: mingw-w64-x86_64-meson mingw-w64-x86_64-pkgconf git mingw-w64-x86_64-binutils mingw-w64-x86_64-gcc mingw-w64-x86_64-sdl3 zlib mingw-w64-x86_64-xxhash
    - run: git config --global core.autocrlf input
      shell: bash
    - uses: actions/checkout@v3
      with: 
        submodules: recursive
    - name: build release
      run: |
        meson setup build
        meson compile -C build
    - name: upload build
      uses: actions/upload-artifact@v4
      with:
        name: sleepdart-windows
        path: sleepdart.exe
    - name: run tests
      run: |
        echo "limit-fps=0" > ./config.ini
        SDL_VIDEODRIVER=dummy ; export SDL_VIDEODRIVER
        SLEEPDART_ERRSILENT=1 ; export SLEEPDART_ERRSILENT
        ./run_tests.sh
